<!DOCTYPE html>
<html>
<head>
    <title>Đăng nhập</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .login-box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        h2{
            text-align:center;
        }

        .error{
            color:red;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>ĐĂNG NHẬP</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input type="text" name="username" placeholder="Tên đăng nhập">

        <input type="password" name="password" placeholder="Mật khẩu">

        <button type="submit">Đăng nhập</button>

    </form>

</div>

</body>
</html>
